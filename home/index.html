<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio Online - Renan Reis Lima</title>

    <meta name="description" content="Portfólio de Renan Reis Lima | Desenvolvedor de Sistemas, cursando FATEC e ETEC, especializando em dados, análise, Python e IA. Confira projetos e currículos deste profissional em constante evolução.">
    <meta name="keywords" content="Desenvolvedor, Programador, Portfólio, Fatec, Etec, Desenvolvimento de Sistemas, HTML, CSS, JavaScript, Bootstrap, Analista, Marketplace, E-commerce, Python, Dados">
    <meta name="author" content="github: siernaner">
    <meta name="robots" content="index, follow">

    <link rel="icon" type="image/png" href="src/favicon.ico">

    <meta property="og:title" content="Portfólio | Desenvolvedor de Sistemas - Renan Reis Lima">
    <meta property="og:description" content="Confira meus projetos de Desenvolvimento de Sistemas (FATEC/ETEC) em um portfólio moderno e minimalista.">
    <meta property="og:url" content="siernaner.github.io">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Portfólio | Renan Reis Lima - Desenvolvedor">
    <meta name="twitter:description" content="Veja projetos em Desenvolvimento de Sistemas e E-commerce.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="min-vh-100">

    <header class="container py-4 py-md-5 px-4 px-md-5">
        <h1 class="fs-1 fw-semibold text-center mb-2">Meu Portfólio - Renan Reis Lima</h1>
        <p class="fs-5 text-center text-secondary mb-0">
            Desenvolvedor de Soluções para Pequenos Negócios
        </p>
        <small class="d-block text-center text-muted mt-2">
            Entre em contato para mais informações.
        </small>
    </header>

    <main class="container px-4 pb-5" style="max-width: 56rem;">
        <div class="d-flex flex-column gap-4">

            <!-- Card: Projetos FATEC -->
            <div class="project-card">
                <div class="project-trigger">
                    <h3 class="fs-4 fw-semibold mb-0" style="letter-spacing: 0.05em;">Projetos FATEC</h3>
                    <span class="plus-indicator">+</span>
                </div>
                <div class="project-content">
                    <div class="pt-2 px-4 pb-4">
                        <ul class="d-flex flex-column gap-1">
                            <li>
                                <span class="sub-label">Em desenvolvimento</span>
                                <ul class="sub-list mt-1 d-flex flex-column gap-1">
                                </ul>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- Card: Projetos ETEC -->
            <div class="project-card">
                <div class="project-trigger">
                    <h3 class="fs-4 fw-semibold mb-0" style="letter-spacing: 0.05em;">Projetos ETEC</h3>
                    <span class="plus-indicator">+</span>
                </div>
                <div class="project-content">
                    <div class="pt-2 px-4 pb-4">
                        <ul class="d-flex flex-column gap-3">
                            <li>
                                <span class="sub-label">Em desenvolvimento</span>
                                <ul class="sub-list mt-1 d-flex flex-column gap-1">
                                </ul>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const triggers = document.querySelectorAll('.project-trigger');

            triggers.forEach(trigger => {
                trigger.addEventListener('click', () => {
                    const content = trigger.nextElementSibling;
                    const indicator = trigger.querySelector('.plus-indicator');

                    indicator.classList.toggle('rotate-45');

                    if (content.style.maxHeight) {
                        content.style.maxHeight = null;
                    } else {
                        content.style.maxHeight = content.scrollHeight + 'px';
                    }
                });
            });
        });
    </script>

</body>
</html>
